# Production Configuration Template
# Copy this to application.properties for production deployment

# Server Configuration
server.port=${PORT:8080}
spring.application.name=pams

# Production Database (Railway/Heroku provides DATABASE_URL)
# For Railway: DATABASE_URL will be automatically used
# For Heroku: Use Heroku's DATABASE_URL environment variable

# Email Configuration (set via environment variables)
spring.mail.host=${EMAIL_HOST:smtp.gmail.com}
spring.mail.port=${EMAIL_PORT:587}
spring.mail.username=${EMAIL_USER}
spring.mail.password=${EMAIL_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Production Settings
spring.profiles.active=production

# File Upload (smaller limits for cloud)
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# Logging
logging.level.com.pams=INFO
logging.level.org.springframework=INFO